name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Lint PR title against Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commit types. The squash-merge title (which becomes the
          # commit semantic-release analyzes on main) must start with one of these.
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            style
            revert
          # Scopes are optional and unrestricted (e.g. lsp, cursor, codex).
          requireScope: false
