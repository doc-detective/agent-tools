name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Lint PR title against Conventional Commits
        # Pinned to a commit SHA (v5) — this is a third-party community action, so
        # a mutable tag would let a compromised/force-pushed tag run arbitrary code
        # with the workflow's GITHUB_TOKEN.
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commit types. The squash-merge title (which becomes the
          # commit semantic-release analyzes on main) must start with one of these.
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            style
            revert
          # Scopes are optional and unrestricted (e.g. lsp, cursor, codex).
          requireScope: false
