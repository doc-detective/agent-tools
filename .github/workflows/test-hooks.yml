name: Test Hooks

on:
  push:
    branches:
      - main
    paths:
      - "src/hooks/**"
      - "tests/hooks/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/hooks/**"
      - "tests/hooks/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: npm run build:no-scripts

      - name: Run hook unit tests
        run: npm run test:hooks
