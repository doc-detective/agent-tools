name: Validate Skills

on:
  push:
    paths:
      - "skills/**"
  pull_request:
    paths:
      - "skills/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install skill-validator
        run: go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest

      - name: Validate skills
        run: |
          skill-validator check --strict --emit-annotations skills/

      - name: Write step summary
        if: always()
        run: |
          skill-validator check --strict -o markdown skills/ >> "$GITHUB_STEP_SUMMARY"
