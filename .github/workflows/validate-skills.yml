name: Validate Skills

on:
  push:
    branches:
      - main
    paths:
      - "src/skills/**"
      - "skills/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/skills/**"
      - "skills/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build artifacts from src/
        run: npm run build:no-scripts

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install skill-validator
        run: go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest

      - name: Validate skills
        run: |
          # Exit codes: 0 = pass, 1 = errors, 2 = warnings only.
          # Treat warnings (exit 2) as success; only fail on actual errors.
          set +e
          skill-validator check --emit-annotations skills/
          rc=$?
          set -e
          if [ "$rc" -eq 1 ]; then exit 1; fi

      - name: Write step summary
        if: always()
        run: |
          skill-validator check -o markdown skills/ >> "$GITHUB_STEP_SUMMARY" || true
